services:
  postgres:
    image: postgres:17
    container_name: cip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-content_platform}
      POSTGRES_USER: ${POSTGRES_USER:-content_platform}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-content_platform}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: cip-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
